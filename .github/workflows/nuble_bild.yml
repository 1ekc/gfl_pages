name: Deploy Massive Bundle with LFS (Final Solution)

on:
  workflow_dispatch:

env:
  BUNDLE_NAME: full.bundle
  RELEASE_TAG: v1.0
  LFS_SKIP_SMUDGE: 1  # Пропускаем первоначальную загрузку LFS

jobs:
  unpack:
    runs-on: self-hosted
    timeout-minutes: 600

    steps:
      # 1. Установка зависимостей
      - name: Install dependencies
        shell: powershell
        run: |
          choco install git -y
          choco install git-lfs -y
          git lfs install --skip-repo
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global init.defaultBranch main
          git config --system core.longpaths true
          git config --global http.postBuffer 524288000

      # 2. Подготовка окружения
      - name: Setup environment
        shell: powershell
        run: |
          Remove-Item -Recurse -Force workspace -ErrorAction SilentlyContinue
          mkdir workspace
          cd workspace
          git init
          git remote add origin "https://x-access-token:$($env:GH_TOKEN)@github.com/${{ github.repository }}.git"

      # 3. Загрузка и сборка bundle
      - name: Download and combine bundle
        working-directory: ./workspace
        shell: powershell
        run: |
          gh release download $env:RELEASE_TAG -p "repo.part.*" --clobber
          cmd /c "copy /b repo.part.* $env:BUNDLE_NAME"
          Remove-Item repo.part.*

      # 4. Проверка bundle
      - name: Verify bundle
        working-directory: ./workspace
        shell: powershell
        run: |
          $header = Get-Content $env:BUNDLE_NAME -TotalCount 1
          if (-not ($header -match "^# v2 git bundle$")) {
            throw "Invalid bundle format"
          }
          git bundle verify $env:BUNDLE_NAME

      # 5. Импорт данных (с улучшенной обработкой LFS)
      - name: Import repository data
        working-directory: ./workspace
        shell: powershell
        run: |
          # Импорт без LFS объектов
          git fetch "../$env:BUNDLE_NAME" "+refs/*:refs/*" --prune
          
          # Создаем основную ветку
          git checkout -b main FETCH_HEAD
          
          # Настраиваем LFS
          git lfs install --local
          git config --local lfs.url "https://x-access-token:$($env:GH_TOKEN)@github.com/${{ github.repository }}.git/info/lfs"
          
          # Пушим сначала без LFS
          git push origin main --force
          git push origin --tags --force
          
          # Затем загружаем LFS объекты
          git lfs fetch --all
          git lfs checkout
          git lfs push --all origin

      # 6. Проверка результата
      - name: Verify result
        shell: powershell
        run: |
          git clone "https://x-access-token:$($env:GH_TOKEN)@github.com/${{ github.repository }}.git" test_clone
          cd test_clone
          git lfs pull
          git log -n 1 --oneline
          git lfs ls-files
