name: Deploy Massive Bundle with LFS (Final Working Version)

on:
  workflow_dispatch:

env:
  BUNDLE_NAME: full.bundle
  RELEASE_TAG: v1.0
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      # 1. Установка зависимостей
      - name: Setup environment
        shell: powershell
        run: |
          # Установка ПО
          choco install git -y
          choco install git-lfs -y
          
          # Настройка Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global init.defaultBranch main
          git config --system core.longpaths true
          git config --global http.postBuffer 524288000
          git config --global core.compression 0

      # 2. Подготовка рабочей директории
      - name: Prepare workspace
        shell: powershell
        run: |
          Remove-Item -Recurse -Force workspace -ErrorAction SilentlyContinue
          mkdir workspace
          cd workspace
          git init
          git lfs install --skip-repo
          git remote add origin "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"

      # 3. Загрузка bundle
      - name: Download bundle parts
        working-directory: ./workspace
        shell: powershell
        run: |
          gh release download $env:RELEASE_TAG -p "repo.part.*" --clobber
          cmd /c "copy /b repo.part.* $env:BUNDLE_NAME"
          Remove-Item repo.part.* -Force
          Write-Host "Bundle created: $((Get-Item $env:BUNDLE_NAME).Length/1MB) MB"

      # 4. Верификация bundle
      - name: Verify bundle
        working-directory: ./workspace
        shell: powershell
        run: |
          if (-not (Test-Path $env:BUNDLE_NAME)) { throw "Bundle file not found" }
          $header = Get-Content $env:BUNDLE_NAME -TotalCount 1
          if (-not ($header -match "^# v2 git bundle$")) { throw "Invalid bundle format" }
          
          Write-Host "Bundle contents:"
          git bundle verify $env:BUNDLE_NAME | Out-Host
          git bundle list-heads $env:BUNDLE_NAME | Out-Host

      # 5. Импорт репозитория
      - name: Import repository
        working-directory: ./workspace
        shell: powershell
        run: |
          # Создаем временный bare-репозиторий
          mkdir temp_repo
          cd temp_repo
          git init --bare
          
          # Импортируем bundle
          git bundle unbundle "../$env:BUNDLE_NAME" | Out-Null
          
          # Создаем ветки из bundle
          git bundle list-heads "../$env:BUNDLE_NAME" | ForEach-Object {
            $ref = $_.Split()[1]
            $hash = $_.Split()[0]
            if ($ref -match "refs/heads/") {
              git update-ref $ref $hash
            }
            if ($ref -match "refs/tags/") {
              git tag -f $(($ref -replace "refs/tags/","") $hash
            }
          }
          
          # Клонируем из временного репозитория
          cd ..
          git clone temp_repo imported_repo
          cd imported_repo
          
          # Настраиваем LFS
          git lfs install --local
          git config --local lfs.url "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git/info/lfs"
          
          # Пушим данные
          git push origin --all --force
          git push origin --tags --force
          
          # Загружаем LFS объекты
          git lfs fetch --all
          git lfs push --all origin
          
          # Очистка
          cd ../..
          Remove-Item -Recurse -Force workspace/temp_repo
          Remove-Item -Recurse -Force workspace/imported_repo

      # 6. Верификация результата
      - name: Verify deployment
        shell: powershell
        run: |
          mkdir verification
          cd verification
          git clone "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          cd *
          git lfs pull
          git log --oneline -n 3
          git lfs ls-files
          Write-Host "Deployment verified successfully"
